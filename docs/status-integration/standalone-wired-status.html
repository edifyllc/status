<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edify & STEM.net Status</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --faint:     #64748b;
      --green-bg:  #064e3b;
      --green-fg:  #6ee7b7;
      --green-dot: #34d399;
      --yellow-bg: #78350f;
      --yellow-fg: #fcd34d;
      --yellow-dot:#fbbf24;
      --red-bg:    #7f1d1d;
      --red-fg:    #fca5a5;
      --red-dot:   #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2.5rem; }

    .brand { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem; }
    .brand a { color: var(--muted); text-decoration: none; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; transition: color .2s; }
    .brand a:hover { color: var(--text); }
    .brand-sep { color: var(--border); }

    header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }

    .overall-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1.25rem; border-radius: 9999px;
      font-weight: 600; font-size: 0.875rem;
    }
    .overall-badge.operational { background: var(--green-bg);  color: var(--green-fg); }
    .overall-badge.degraded    { background: var(--yellow-bg); color: var(--yellow-fg); }
    .overall-badge.outage      { background: var(--red-bg);    color: var(--red-fg); }

    .last-updated { font-size: 0.75rem; color: var(--muted); margin-top: 0.75rem; }

    /* ── Dots ── */
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.operational { background: var(--green-dot); }
    .dot.degraded    { background: var(--yellow-dot); }
    .dot.outage      { background: var(--red-dot); }
    .dot.pass        { background: var(--green-dot); }
    .dot.fail        { background: var(--red-dot); }

    /* ── Section labels ── */
    .section-label {
      font-size: 0.75rem; font-weight: 700; color: var(--faint);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 2rem 0 0.75rem;
    }

    /* ── Services ── */
    .services { display: flex; flex-direction: column; gap: 2px; }

    .service-group { margin-bottom: 0.5rem; }
    .group-name {
      font-size: 0.65rem; font-weight: 700; color: var(--faint);
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 0.5rem 1rem 0.25rem;
    }

    .service {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 1rem;
      background: var(--surface);
      border-radius: 0.375rem;
      border: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .service-name { font-size: 0.875rem; font-weight: 500; }
    .service-right { display: flex; align-items: center; gap: 0.5rem; }
    .service-status { font-size: 0.75rem; color: var(--muted); text-transform: capitalize; }

    /* ── Uptime bar ── */
    .uptime-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; }
    .history { display: flex; gap: 2px; align-items: flex-end; height: 36px; }
    .hbar { flex: 1; min-width: 2px; border-radius: 2px; transition: opacity .15s; }
    .hbar:hover { opacity: 0.7; }
    .hbar.operational { background: var(--green-dot); }
    .hbar.degraded    { background: var(--yellow-dot); }
    .hbar.outage      { background: var(--red-dot); }
    .history-meta { display: flex; justify-content: space-between; margin-top: 0.4rem; font-size: 0.625rem; color: var(--faint); }

    /* ── Tests ── */
    .tests-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; }
    .tests-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
    .tests-headline { font-size: 0.9rem; font-weight: 700; }
    .tests-headline.pass { color: var(--green-fg); }
    .tests-headline.fail { color: var(--red-fg); }
    .tests-time { font-size: 0.625rem; color: var(--faint); }

    .test-groups { display: flex; flex-direction: column; gap: 1rem; }
    .test-group-label { font-size: 0.65rem; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.35rem; }
    .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 2px; }
    .test-item { font-size: 0.7rem; padding: 0.3rem 0.5rem; border-radius: 0.25rem; display: flex; align-items: center; gap: 0.375rem; }
    .test-item.pass { color: var(--green-fg); }
    .test-item.fail { color: var(--red-fg); background: #7f1d1d22; }
    .test-check { font-size: 0.8rem; flex-shrink: 0; }

    /* ── Footer ── */
    footer { text-align: center; margin-top: 3rem; font-size: 0.75rem; color: var(--faint); }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 2rem; color: var(--faint); }
    .error-msg { text-align: center; color: var(--red-fg); font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="brand">
      <a href="https://www.uedify.com" target="_blank" rel="noopener">uEdify</a>
      <span class="brand-sep">·</span>
      <a href="https://stem.net" target="_blank" rel="noopener">STEM.net</a>
    </div>
    <h1>System Status</h1>
    <div id="overall-badge" class="overall-badge operational">
      <span class="dot operational"></span>
      Loading…
    </div>
    <p id="last-updated" class="last-updated"></p>
  </header>

  <!-- Services -->
  <div class="section-label">Services</div>
  <div id="services" class="services">
    <div class="loading">Loading…</div>
  </div>

  <!-- Uptime -->
  <div class="section-label">Uptime — last 24 h</div>
  <div class="uptime-wrap">
    <div id="history" class="history"></div>
    <div id="history-meta" class="history-meta"></div>
  </div>

  <!-- Production Tests -->
  <div class="section-label">Production Test Suite</div>
  <div id="tests" class="tests-card">
    <div class="loading">Loading…</div>
  </div>

  <footer>
    <p>Automated health checks every 5 minutes &nbsp;·&nbsp; <a href="https://github.com/edifyllc/status" target="_blank" rel="noopener">View source</a></p>
  </footer>

</div>
<script>
// ── Data fetching ─────────────────────────────────────────────────────────────

async function fetchJSON(url) {
  const r = await fetch(url + '?_=' + Date.now());
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function loadAll() {
  const [status, history, tests] = await Promise.allSettled([
    fetchJSON('./status.json'),
    fetchJSON('./history.json'),
    fetchJSON('./production-tests.json'),
  ]);
  if (status.status  === 'fulfilled') renderOverall(status.value);
  if (status.status  === 'fulfilled') renderServices(status.value.services);
  if (history.status === 'fulfilled') renderHistory(history.value);
  if (tests.status   === 'fulfilled') renderTests(tests.value);
}

// ── Renderers ─────────────────────────────────────────────────────────────────

function renderOverall(data) {
  const s = data.overall || 'operational';
  const label = { operational: 'All Systems Operational', degraded: 'Partial Degradation', outage: 'Service Outage' }[s] || s;
  const el = document.getElementById('overall-badge');
  el.className = `overall-badge ${s}`;
  el.innerHTML = `<span class="dot ${s}"></span>${label}`;
  if (data.lastUpdated) {
    document.getElementById('last-updated').textContent =
      'Last checked: ' + new Date(data.lastUpdated).toLocaleString();
  }
}

const SERVICE_GROUPS = [
  { label: 'Edify',   ids: ['edify_health','edify_referral','edify_ai','edify_booking'] },
  { label: 'STEM.net',ids: ['stem_health','stem_educators'] },
  { label: 'Infrastructure', ids: ['database','stripe_edify','stripe_stem','ai_subscriptions','ai_provider'] },
];

function renderServices(services) {
  if (!services?.length) { document.getElementById('services').innerHTML = '<p class="error-msg">No services found</p>'; return; }
  const byId = Object.fromEntries(services.map(s => [s.id, s]));
  document.getElementById('services').innerHTML = SERVICE_GROUPS.map(g => `
    <div class="service-group">
      <div class="group-name">${g.label}</div>
      ${g.ids.map(id => {
        const s = byId[id];
        if (!s) return '';
        return `<div class="service">
          <span class="service-name">${s.name}</span>
          <span class="service-right">
            <span class="dot ${s.status}"></span>
            <span class="service-status">${s.status}</span>
          </span>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function renderHistory(entries) {
  if (!entries?.length) return;
  const slice = entries.slice(-288);
  document.getElementById('history').innerHTML = slice.map(e => {
    const h = e.status === 'operational' ? '100%' : e.status === 'degraded' ? '60%' : '30%';
    const ts = new Date(e.timestamp).toLocaleString();
    return `<div class="hbar ${e.status}" style="height:${h}" title="${ts} — ${e.status}"></div>`;
  }).join('');
  const first = new Date(slice[0].timestamp);
  const last  = new Date(slice[slice.length - 1].timestamp);
  const fmt   = d => d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  document.getElementById('history-meta').innerHTML =
    `<span>${fmt(first)}</span><span>${fmt(last)}</span>`;
}

const TEST_GROUPS = [
  { label: 'Pages',        prefix: 'page_' },
  { label: 'API',          prefix: 'api_' },
  { label: 'Auth',         prefix: 'auth_' },
  { label: 'Embed',        prefix: 'embed_' },
  { label: 'Org',          prefix: 'org_' },
  { label: 'Referral',     prefix: 'referral_' },
  { label: 'Regressions',  prefix: 'regr_' },
  { label: 'STEM.net',     prefix: 'stem_' },
];

function renderTests(data) {
  if (!data?.tests) { document.getElementById('tests').innerHTML = '<p class="error-msg">No test data</p>'; return; }
  const time = data.timestamp ? new Date(data.timestamp).toLocaleString() : '';
  const cls  = data.overall === 'pass' ? 'pass' : 'fail';

  const grouped = TEST_GROUPS.map(g => ({
    label: g.label,
    tests: data.tests.filter(t => t.id.startsWith(g.prefix)),
  })).filter(g => g.tests.length);

  document.getElementById('tests').innerHTML = `
    <div class="tests-header">
      <span class="tests-headline ${cls}">${data.passed}/${data.total} tests passing</span>
      <span class="tests-time">${time}</span>
    </div>
    <div class="test-groups">
      ${grouped.map(g => `
        <div>
          <div class="test-group-label">${g.label}</div>
          <div class="test-grid">
            ${g.tests.map(t => `
              <div class="test-item ${t.status}">
                <span class="test-check">${t.status === 'pass' ? '✓' : '✗'}</span>
                <span>${t.name}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
setInterval(loadAll, 60_000);
</script>
</body>
</html>
