<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edify Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .overall {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .overall.operational, .overall.pass { background: #064e3b; color: #6ee7b7; }
    .overall.degraded, .overall.fail { background: #78350f; color: #fbbf24; }
    .overall.down { background: #7f1d1d; color: #fca5a5; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .dot.operational, .dot.pass { background: #34d399; }
    .dot.degraded { background: #fbbf24; }
    .dot.down, .dot.fail { background: #f87171; }
    .section-title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #71717a; margin: 1.5rem 0 0.75rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-meta { font-size: 0.7rem; font-weight: 400; text-transform: none; letter-spacing: normal; }
    .service-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .service {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; background: #18181b;
      border: 1px solid #27272a; border-radius: 0.5rem;
    }
    .service-name { font-size: 0.85rem; font-weight: 500; }
    .service-status {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem;
    }
    .service-status.operational, .service-status.pass { color: #6ee7b7; }
    .service-status.down, .service-status.fail { color: #fca5a5; }
    .service-detail { font-size: 0.7rem; color: #71717a; margin-left: 0.5rem; }
    .test-summary {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1rem; background: #18181b;
      border: 1px solid #27272a; border-radius: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .test-score { font-size: 1.5rem; font-weight: 700; }
    .test-score.pass { color: #34d399; }
    .test-score.fail { color: #f87171; }
    .test-meta { font-size: 0.8rem; color: #a1a1aa; }
    .history-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0.75rem; font-size: 0.8rem;
      border-bottom: 1px solid #27272a;
    }
    .history-row:last-child { border-bottom: none; }
    .history-time { color: #71717a; min-width: 140px; }
    .history-result { font-weight: 600; min-width: 50px; }
    .history-result.pass { color: #6ee7b7; }
    .history-result.fail { color: #fca5a5; }
    .history-detail { color: #a1a1aa; }
    .uptime-bar {
      display: flex; gap: 1px; margin: 2rem 0 0.5rem;
      height: 32px; border-radius: 4px; overflow: hidden;
    }
    .uptime-bar .bar { flex: 1; min-width: 2px; }
    .uptime-bar .bar.operational { background: #34d399; }
    .uptime-bar .bar.degraded { background: #fbbf24; }
    .uptime-bar .bar.down { background: #f87171; }
    .uptime-bar .bar.unknown { background: #3f3f46; }
    .uptime-label {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: #71717a;
    }
    .tabs {
      display: flex; gap: 0.5rem; margin-bottom: 1rem;
      border-bottom: 1px solid #27272a; padding-bottom: 0.5rem;
    }
    .tab {
      padding: 0.4rem 0.8rem; border-radius: 0.375rem;
      font-size: 0.8rem; font-weight: 500; cursor: pointer;
      background: transparent; color: #71717a; border: none;
      transition: all 0.15s;
    }
    .tab.active { background: #27272a; color: #e4e4e7; }
    .tab:hover { color: #e4e4e7; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .footer {
      margin-top: 3rem; padding-top: 1.5rem;
      border-top: 1px solid #27272a; text-align: center;
      font-size: 0.75rem; color: #52525b;
    }
    .footer a { color: #a1a1aa; text-decoration: none; }
    .footer a:hover { color: #e4e4e7; }
    .last-updated { font-size: 0.75rem; color: #71717a; }
    .collapse-btn {
      background: none; border: none; color: #71717a;
      font-size: 0.75rem; cursor: pointer; padding: 0.25rem 0.5rem;
    }
    .collapse-btn:hover { color: #e4e4e7; }
    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem; }
      h1 { font-size: 1.25rem; }
      .test-summary { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="pageTitle">🟢 Edify Status</h1>
      <span class="last-updated" id="lastUpdated">Loading...</span>
    </header>

    <div id="overallBanner"></div>

    <div class="tabs">
      <button class="tab active" data-tab="health">Health</button>
      <button class="tab" data-tab="staging">Staging Tests</button>
      <button class="tab" data-tab="production-tests">Post-Deploy</button>
      <button class="tab" data-tab="history">History</button>
    </div>

    <!-- HEALTH TAB -->
    <div class="tab-content active" id="tab-health">
      <div class="section-title">Edify (uedify.com)</div>
      <div class="service-list" id="edifyServices"></div>

      <div class="section-title">STEM.net</div>
      <div class="service-list" id="stemServices"></div>

      <div class="section-title" id="agentsTitle" style="display:none">Org AI Agents</div>
      <div class="service-list" id="agentServices"></div>

      <div class="section-title">Uptime (last 24 hours)</div>
      <div class="uptime-bar" id="uptimeBar"></div>
      <div class="uptime-label"><span>24h ago</span><span>Now</span></div>
    </div>

    <!-- STAGING TESTS TAB -->
    <div class="tab-content" id="tab-staging">
      <div id="stagingTestSummary"></div>
      <div class="section-title">Test Results <span class="section-meta" id="stagingTestTime"></span></div>
      <div class="service-list" id="stagingTestList"></div>
    </div>

    <!-- POST-DEPLOY TESTS TAB -->
    <div class="tab-content" id="tab-production-tests">
      <div id="prodTestSummary"></div>
      <div class="section-title">Production Smoke Tests <span class="section-meta" id="prodTestTime"></span></div>
      <div class="service-list" id="prodTestList"></div>
    </div>

    <!-- HISTORY TAB -->
    <div class="tab-content" id="tab-history">
      <div class="section-title">Staging Test History (last 20 runs)</div>
      <div id="stagingHistory"></div>
      <div class="section-title" style="margin-top:1.5rem">Production Test History (last 20 runs)</div>
      <div id="prodHistory"></div>
    </div>

    <div class="footer">
      Powered by <a href="https://www.uedify.com">Edify</a> &middot; Health: every 5 min &middot; Tests: on deploy
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    const EDIFY_KEYS = ['edify_health', 'edify_referral', 'edify_auth', 'edify_ai', 'edify_signup'];
    const STEM_KEYS = ['stem_health', 'stem_educators', 'stem_programs', 'stem_claim', 'stem_auth'];
    const KNOWN_KEYS = new Set([...EDIFY_KEYS, ...STEM_KEYS]);

    function statusLabel(s) {
      const cls = s === 'operational' || s === 'pass' ? 'pass' : 'fail';
      const text = s === 'operational' ? 'Operational' : s === 'pass' ? 'Passed' : s === 'down' ? 'Down' : 'Failed';
      return `<span class="dot ${cls}"></span> ${text}`;
    }

    function renderServices(services, keys, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (const key of keys) {
        const svc = services.find(s => s.id === key);
        if (!svc) continue;
        const div = document.createElement('div');
        div.className = 'service';
        div.innerHTML = `
          <span class="service-name">${svc.name}</span>
          <span class="service-status ${svc.status}">${statusLabel(svc.status)}</span>
        `;
        container.appendChild(div);
      }
    }

    function renderTests(tests, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (const test of tests) {
        const div = document.createElement('div');
        div.className = 'service';
        div.innerHTML = `
          <span class="service-name">${test.name}</span>
          <span class="service-status ${test.status}">
            ${statusLabel(test.status)}
            <span class="service-detail">${test.detail || ''}</span>
          </span>
        `;
        container.appendChild(div);
      }
    }

    function renderTestSummary(run, containerId, timeId) {
      const container = document.getElementById(containerId);
      if (!run) {
        container.innerHTML = '<div class="test-summary"><span class="test-meta">No test runs yet</span></div>';
        return;
      }
      container.innerHTML = `
        <div class="test-summary">
          <span class="test-score ${run.overall}">${run.passed}/${run.total}</span>
          <div>
            <div class="test-meta">${run.overall === 'pass' ? '✅ All tests passed' : `⚠️ ${run.failed} test(s) failed`}</div>
            <div class="test-meta">${timeAgo(run.timestamp)}</div>
          </div>
        </div>
      `;
      if (timeId) {
        document.getElementById(timeId).textContent = new Date(run.timestamp).toLocaleString();
      }
    }

    function renderHistory(runs, containerId) {
      const container = document.getElementById(containerId);
      if (!runs || runs.length === 0) {
        container.innerHTML = '<div class="history-row"><span class="history-time">No runs yet</span></div>';
        return;
      }
      container.innerHTML = runs.slice().reverse().map(r => `
        <div class="history-row">
          <span class="history-time">${new Date(r.timestamp).toLocaleString()}</span>
          <span class="history-result ${r.overall}">${r.overall === 'pass' ? '✅' : '❌'}</span>
          <span class="history-detail">${r.passed}/${r.total} passed${r.failed > 0 ? ` (${r.failed} failed)` : ''}</span>
        </div>
      `).join('');
    }

    function renderUptime(history) {
      const bar = document.getElementById('uptimeBar');
      bar.innerHTML = '';
      const entries = history.slice(-288);
      const padded = new Array(288 - entries.length).fill({ status: 'unknown' }).concat(entries);
      for (const entry of padded) {
        const div = document.createElement('div');
        div.className = `bar ${entry.status}`;
        div.title = entry.timestamp || 'No data';
        bar.appendChild(div);
      }
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ${mins % 60}m ago`;
      return `${Math.floor(hrs/24)}d ago`;
    }

    async function load() {
      try {
        const [statusRes, historyRes] = await Promise.all([
          fetch('status.json?' + Date.now()),
          fetch('history.json?' + Date.now())
        ]);
        const status = await statusRes.json();
        const history = await historyRes.json();

        // Overall banner
        const banner = document.getElementById('overallBanner');
        const overallText = status.overall === 'operational' ? 'All Systems Operational' :
                           status.overall === 'degraded' ? 'Some Systems Degraded' : 'Major Outage';
        banner.innerHTML = `<div class="overall ${status.overall}"><span class="dot ${status.overall}"></span> ${overallText}</div>`;
        document.getElementById('lastUpdated').textContent = `Updated ${timeAgo(status.lastUpdated)}`;
        document.title = status.overall === 'operational' ? '✅ Edify Status' : '⚠️ Edify Status';
        document.getElementById('pageTitle').textContent = (status.overall === 'operational' ? '🟢' : '🟡') + ' Edify Status';

        // Health services
        renderServices(status.services, EDIFY_KEYS, 'edifyServices');
        renderServices(status.services, STEM_KEYS, 'stemServices');
        const agentSvcs = status.services.filter(s => !KNOWN_KEYS.has(s.id));
        if (agentSvcs.length > 0) {
          document.getElementById('agentsTitle').style.display = '';
          const container = document.getElementById('agentServices');
          container.innerHTML = '';
          for (const svc of agentSvcs) {
            const div = document.createElement('div');
            div.className = 'service';
            div.innerHTML = `<span class="service-name">${svc.name}</span><span class="service-status ${svc.status}">${statusLabel(svc.status)}</span>`;
            container.appendChild(div);
          }
        }
        renderUptime(history);
      } catch (e) {
        document.getElementById('overallBanner').innerHTML = '<div class="overall degraded"><span class="dot degraded"></span> Status data unavailable</div>';
      }

      // Staging tests
      try {
        const res = await fetch('staging-tests.json?' + Date.now());
        if (res.ok) {
          const run = await res.json();
          renderTestSummary(run, 'stagingTestSummary', 'stagingTestTime');
          renderTests(run.tests, 'stagingTestList');
        }
      } catch (e) {}

      // Production tests
      try {
        const res = await fetch('production-tests.json?' + Date.now());
        if (res.ok) {
          const run = await res.json();
          renderTestSummary(run, 'prodTestSummary', 'prodTestTime');
          renderTests(run.tests, 'prodTestList');
        }
      } catch (e) {}

      // History
      try {
        const [stagRes, prodRes] = await Promise.all([
          fetch('staging-test-history.json?' + Date.now()).then(r => r.ok ? r.json() : []),
          fetch('production-test-history.json?' + Date.now()).then(r => r.ok ? r.json() : [])
        ]);
        renderHistory(stagRes, 'stagingHistory');
        renderHistory(prodRes, 'prodHistory');
      } catch (e) {}
    }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
