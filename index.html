<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edify & STEM.net Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .overall-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 9999px; font-weight: 600; font-size: 0.875rem; }
    .overall-badge.operational { background: #064e3b; color: #6ee7b7; }
    .overall-badge.degraded { background: #78350f; color: #fcd34d; }
    .overall-badge.outage { background: #7f1d1d; color: #fca5a5; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.operational { background: #34d399; }
    .dot.degraded { background: #fbbf24; }
    .dot.outage { background: #f87171; }
    .last-updated { font-size: 0.75rem; color: #94a3b8; margin-top: 0.75rem; }
    .services { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
    .service { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1rem; background: #1e293b; border-radius: 0.5rem; border: 1px solid #334155; }
    .service-name { font-size: 0.875rem; font-weight: 500; }
    .service-status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; text-transform: capitalize; }
    .section-title { font-size: 0.875rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin: 1.5rem 0 0.75rem; }
    .history { display: flex; gap: 2px; align-items: end; height: 32px; margin-top: 1rem; }
    .history-bar { flex: 1; min-width: 3px; border-radius: 2px; }
    .history-bar.operational { background: #34d399; }
    .history-bar.degraded { background: #fbbf24; }
    .history-bar.outage { background: #f87171; }
    .history-label { display: flex; justify-content: space-between; font-size: 0.625rem; color: #64748b; margin-top: 0.25rem; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #64748b; }
    footer a { color: #94a3b8; text-decoration: none; }
    .tests-summary { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; margin-top: 1rem; }
    .tests-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .tests-count { font-size: 0.875rem; font-weight: 600; }
    .tests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.25rem; }
    .test-item { font-size: 0.7rem; padding: 0.25rem 0.5rem; border-radius: 0.25rem; display: flex; align-items: center; gap: 0.375rem; }
    .test-item.pass { color: #6ee7b7; }
    .test-item.fail { color: #fca5a5; background: #7f1d1d33; }
    .loading { text-align: center; padding: 4rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Edify & STEM.net Status</h1>
      <div id="overall-badge" class="overall-badge operational">
        <span class="dot operational"></span>
        Loading...
      </div>
      <p id="last-updated" class="last-updated"></p>
    </header>

    <div id="services" class="services">
      <div class="loading">Loading status...</div>
    </div>

    <div class="section-title">Uptime (last 24h)</div>
    <div id="history" class="history"></div>
    <div id="history-label" class="history-label"></div>

    <div class="section-title">Production Tests</div>
    <div id="tests" class="tests-summary">
      <div class="loading">Loading tests...</div>
    </div>

    <footer>
      <p>Powered by automated health checks every 5 minutes</p>
      <p style="margin-top:0.5rem"><a href="https://www.uedify.com">uedify.com</a> &middot; <a href="https://stem.net">stem.net</a></p>
    </footer>
  </div>

  <script>
    const BASE = '';

    async function loadStatus() {
      try {
        const res = await fetch(`${BASE}/status.json`);
        const data = await res.json();
        renderOverall(data);
        renderServices(data.services);
      } catch (e) {
        document.getElementById('services').innerHTML = '<p style="color:#f87171;text-align:center">Failed to load status data</p>';
      }
    }

    async function loadHistory() {
      try {
        const res = await fetch(`${BASE}/history.json`);
        const data = await res.json();
        renderHistory(data.slice(-288)); // last 24h at 5-min intervals
      } catch (e) {}
    }

    async function loadTests() {
      try {
        const res = await fetch(`${BASE}/production-tests.json`);
        const data = await res.json();
        renderTests(data);
      } catch (e) {
        document.getElementById('tests').innerHTML = '<p style="color:#64748b;font-size:0.75rem">No test data available</p>';
      }
    }

    function renderOverall(data) {
      const badge = document.getElementById('overall-badge');
      const status = data.overall || 'operational';
      badge.className = `overall-badge ${status}`;
      badge.innerHTML = `<span class="dot ${status}"></span>${status === 'operational' ? 'All Systems Operational' : status === 'degraded' ? 'Partial Degradation' : 'Service Outage'}`;

      const updated = document.getElementById('last-updated');
      if (data.lastUpdated) {
        const d = new Date(data.lastUpdated);
        updated.textContent = `Last checked: ${d.toLocaleString()}`;
      }
    }

    function renderServices(services) {
      const container = document.getElementById('services');
      if (!services || services.length === 0) {
        container.innerHTML = '<p style="color:#64748b;text-align:center">No services configured</p>';
        return;
      }
      container.innerHTML = services.map(s => `
        <div class="service">
          <span class="service-name">${s.name}</span>
          <span class="service-status">
            <span class="dot ${s.status}"></span>
            ${s.status}
          </span>
        </div>
      `).join('');
    }

    function renderHistory(entries) {
      const container = document.getElementById('history');
      if (!entries || entries.length === 0) return;
      container.innerHTML = entries.map(e =>
        `<div class="history-bar ${e.status}" style="height:${e.status === 'operational' ? '100%' : e.status === 'degraded' ? '60%' : '30%'}" title="${new Date(e.timestamp).toLocaleString()} - ${e.status}"></div>`
      ).join('');

      const label = document.getElementById('history-label');
      const first = new Date(entries[0].timestamp);
      const last = new Date(entries[entries.length - 1].timestamp);
      label.innerHTML = `<span>${first.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span><span>${last.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>`;
    }

    function renderTests(data) {
      const container = document.getElementById('tests');
      if (!data || !data.tests) {
        container.innerHTML = '<p style="color:#64748b;font-size:0.75rem">No test data</p>';
        return;
      }
      const passed = data.passed || 0;
      const total = data.total || 0;
      const time = data.timestamp ? new Date(data.timestamp).toLocaleString() : '';
      container.innerHTML = `
        <div class="tests-header">
          <span class="tests-count" style="color:${data.overall === 'pass' ? '#6ee7b7' : '#fca5a5'}">${passed}/${total} tests passing</span>
          <span style="font-size:0.625rem;color:#64748b">${time}</span>
        </div>
        <div class="tests-grid">
          ${data.tests.map(t => `<div class="test-item ${t.status}">${t.status === 'pass' ? '&#10003;' : '&#10007;'} ${t.name}</div>`).join('')}
        </div>
      `;
    }

    loadStatus();
    loadHistory();
    loadTests();
    // Auto-refresh every 60 seconds
    setInterval(() => { loadStatus(); loadHistory(); loadTests(); }, 60000);
  </script>
</body>
</html>
