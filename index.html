<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edify Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    .overall {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .overall.operational { background: #064e3b; color: #6ee7b7; }
    .overall.degraded { background: #78350f; color: #fbbf24; }
    .overall.down { background: #7f1d1d; color: #fca5a5; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.operational { background: #34d399; }
    .dot.degraded { background: #fbbf24; }
    .dot.down { background: #f87171; }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin: 1.5rem 0 0.75rem;
    }
    .service-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .service {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1rem;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 0.5rem;
    }
    .service-name {
      font-size: 0.9rem;
      font-weight: 500;
    }
    .service-status {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
    }
    .service-status.operational { color: #6ee7b7; }
    .service-status.down { color: #fca5a5; }
    .uptime-bar {
      display: flex;
      gap: 1px;
      margin: 2rem 0 0.5rem;
      height: 32px;
      border-radius: 4px;
      overflow: hidden;
    }
    .uptime-bar .bar {
      flex: 1;
      min-width: 2px;
    }
    .uptime-bar .bar.operational { background: #34d399; }
    .uptime-bar .bar.degraded { background: #fbbf24; }
    .uptime-bar .bar.down { background: #f87171; }
    .uptime-bar .bar.unknown { background: #3f3f46; }
    .uptime-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #71717a;
    }
    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #27272a;
      text-align: center;
      font-size: 0.75rem;
      color: #52525b;
    }
    .footer a { color: #a1a1aa; text-decoration: none; }
    .footer a:hover { color: #e4e4e7; }
    .last-updated {
      font-size: 0.75rem;
      color: #71717a;
    }
    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem; }
      h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🟢 Edify Status</h1>
      <span class="last-updated" id="lastUpdated">Loading...</span>
    </header>

    <div id="overallBanner"></div>

    <div class="section-title">Edify (uedify.com)</div>
    <div class="service-list" id="edifyServices"></div>

    <div class="section-title">STEM.net</div>
    <div class="service-list" id="stemServices"></div>

    <div class="section-title" id="agentsTitle" style="display:none">Org AI Agents</div>
    <div class="service-list" id="agentServices"></div>

    <div class="section-title">Uptime (last 24 hours)</div>
    <div class="uptime-bar" id="uptimeBar"></div>
    <div class="uptime-label">
      <span>24h ago</span>
      <span>Now</span>
    </div>

    <div class="footer">
      Powered by <a href="https://www.uedify.com">Edify</a> &middot; Checks every 5 minutes
    </div>
  </div>

  <script>
    const EDIFY_KEYS = ['edify_health', 'edify_referral', 'edify_auth', 'edify_ai', 'edify_signup'];
    const STEM_KEYS = ['stem_health', 'stem_educators', 'stem_programs', 'stem_claim', 'stem_auth'];
    const KNOWN_KEYS = new Set([...EDIFY_KEYS, ...STEM_KEYS]);

    function statusLabel(s) {
      if (s === 'operational') return '<span class="dot operational"></span> Operational';
      if (s === 'degraded') return '<span class="dot degraded"></span> Degraded';
      return '<span class="dot down"></span> Down';
    }

    function renderServices(services, keys, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (const key of keys) {
        const svc = services.find(s => s.id === key);
        if (!svc) continue;
        const div = document.createElement('div');
        div.className = 'service';
        div.innerHTML = `
          <span class="service-name">${svc.name}</span>
          <span class="service-status ${svc.status}">${statusLabel(svc.status)}</span>
        `;
        container.appendChild(div);
      }
    }

    function renderUptime(history) {
      const bar = document.getElementById('uptimeBar');
      bar.innerHTML = '';
      // Show last 288 entries (24h at 5min intervals), pad with unknown
      const entries = history.slice(-288);
      const padded = new Array(288 - entries.length).fill({ status: 'unknown' }).concat(entries);
      for (const entry of padded) {
        const div = document.createElement('div');
        div.className = `bar ${entry.status}`;
        div.title = entry.timestamp || 'No data';
        bar.appendChild(div);
      }
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      return `${hrs}h ${mins % 60}m ago`;
    }

    async function load() {
      try {
        const [statusRes, historyRes] = await Promise.all([
          fetch('status.json?' + Date.now()),
          fetch('history.json?' + Date.now())
        ]);
        const status = await statusRes.json();
        const history = await historyRes.json();

        // Overall banner
        const banner = document.getElementById('overallBanner');
        const overallText = status.overall === 'operational' ? 'All Systems Operational' :
                           status.overall === 'degraded' ? 'Some Systems Degraded' : 'Major Outage';
        banner.innerHTML = `<div class="overall ${status.overall}"><span class="dot ${status.overall}"></span> ${overallText}</div>`;

        // Last updated
        document.getElementById('lastUpdated').textContent = `Updated ${timeAgo(status.lastUpdated)}`;

        // Services
        renderServices(status.services, EDIFY_KEYS, 'edifyServices');
        renderServices(status.services, STEM_KEYS, 'stemServices');

        // Dynamic agent services (any id not in KNOWN_KEYS)
        const agentSvcs = status.services.filter(s => !KNOWN_KEYS.has(s.id));
        if (agentSvcs.length > 0) {
          document.getElementById('agentsTitle').style.display = '';
          const container = document.getElementById('agentServices');
          container.innerHTML = '';
          for (const svc of agentSvcs) {
            const div = document.createElement('div');
            div.className = 'service';
            div.innerHTML = `
              <span class="service-name">${svc.name}</span>
              <span class="service-status ${svc.status}">${statusLabel(svc.status)}</span>
            `;
            container.appendChild(div);
          }
        }

        // Uptime bar
        renderUptime(history);

        // Update title
        document.title = status.overall === 'operational' ? '✅ Edify Status' : '⚠️ Edify Status';
      } catch (e) {
        document.getElementById('overallBanner').innerHTML = '<div class="overall degraded"><span class="dot degraded"></span> Status data unavailable</div>';
      }
    }

    load();
    setInterval(load, 60000); // Refresh every minute
  </script>
</body>
</html>
